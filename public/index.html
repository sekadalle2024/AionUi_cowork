<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>AionUi</title>
  </head>
  <style>
    html,
    body,
    #root {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      /* Set default text color for light/dark mode 设置明暗模式的默认文字颜色 */
      color: var(--text-primary);
    }
  </style>
  <body>
    <div id="root"></div>
    
    <!-- AIONUI Table Enhancement Scripts -->
    <!-- Load after React app initialization to avoid conflicts -->
    <script>
      // Wait for React app to be fully loaded
      window.addEventListener('load', function() {
        setTimeout(function() {
          // Load Table Enhancer (Flowise)
          const tableEnhancerScript = document.createElement('script');
          tableEnhancerScript.src = './scripts/aionui_flowise.js';
          tableEnhancerScript.async = true;
          tableEnhancerScript.onload = function() {
            console.log('✅ AIONUI Flowise loaded');
          };
          tableEnhancerScript.onerror = function() {
            console.error('❌ Failed to load AIONUI Flowise');
          };
          document.head.appendChild(tableEnhancerScript);
          
          // Load Context Menu (after a small delay)
          setTimeout(function() {
            const contextMenuScript = document.createElement('script');
            contextMenuScript.src = './scripts/aionui_menu.js';
            contextMenuScript.async = true;
            contextMenuScript.onload = function() {
              console.log('✅ AIONUI Menu loaded');
            };
            contextMenuScript.onerror = function() {
              console.error('❌ Failed to load AIONUI Menu');
            };
            document.head.appendChild(contextMenuScript);
          }, 500);

          // Load Diagnostic Script (in development)
          if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
            setTimeout(function() {
              const diagnosticScript = document.createElement('script');
              diagnosticScript.src = './scripts/aionui_diagnostic.js';
              diagnosticScript.async = true;
              diagnosticScript.onload = function() {
                console.log('🔍 AIONUI Diagnostic loaded');
              };
              document.head.appendChild(diagnosticScript);
            }, 1000);

            // Load Right-Click Test Script
            setTimeout(function() {
              const rightClickTestScript = document.createElement('script');
              rightClickTestScript.src = './scripts/aionui_rightclick_test.js';
              rightClickTestScript.async = true;
              rightClickTestScript.onload = function() {
                console.log('🖱️ AIONUI Right-Click Test loaded');
              };
              document.head.appendChild(rightClickTestScript);
            }, 1500);

            // Load Alternative Menu System (works without context menu)
            setTimeout(function() {
              const altMenuScript = document.createElement('script');
              altMenuScript.src = './scripts/aionui_menu_alternative.js';
              altMenuScript.async = true;
              altMenuScript.onload = function() {
                console.log('🎯 AIONUI Alternative Menu loaded');
              };
              document.head.appendChild(altMenuScript);
            }, 2000);
          }
        }, 1000);
      });
    </script>
  </body>
</html>
